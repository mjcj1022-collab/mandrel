name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          # Set repo variable VITE_API_URL to your hosted backend to make the
          # live site use it. Unset = the app runs standalone. (Settings →
          # Secrets and variables → Actions → Variables)
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          # Set VITE_STRIPE_PK (Stripe publishable key) to turn on the checkout
          # screen. Needs VITE_API_URL + the server's STRIPE_SECRET_KEY too.
          VITE_STRIPE_PK: ${{ vars.VITE_STRIPE_PK }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  # Redeploy the Render API on the same push, so `git push` ships both halves.
  # Needs repo secret RENDER_DEPLOY_HOOK (Render → blue-flame-api → Settings →
  # Deploy Hook → copy URL). Unset = skipped, front end still deploys.
  # Not needed if you grant Render's GitHub App access to this repo — then
  # Render auto-deploys on push by itself.
  api:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not set — skipping API deploy."
            exit 0
          fi
          curl -fsS -X POST "$HOOK" -o /dev/null
          echo "Render API deploy triggered."
